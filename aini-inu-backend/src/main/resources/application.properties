spring.application.name=aini-inu

# Database Configuration (PostgreSQL + pgvector local baseline)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ainiinu}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ainiinu}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ainiinu}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# SQL init (DDL alignment scripts)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/ddl/*.sql
spring.sql.init.data-locations=classpath:db/seed/00_lookup_seed.sql,classpath:db/seed/10_core_sample_seed.sql,classpath:db/seed/20_status_edge_seed.sql,classpath:db/seed/99_reset_sequences.sql
spring.sql.init.continue-on-error=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.scit.ainiinu=debug
# JWT Configuration (Issue #1)
# WARNING: This is a development secret key. NEVER use this in production!
# Production: Set JWT_SECRET environment variable with a strong random key (32+ characters)
# Generate: openssl rand -base64 32
jwt.secret=${JWT_SECRET:your-super-secret-key-must-be-at-least-32-characters-long-for-hs256-algorithm}
jwt.access-token-validity-ms=3600000
jwt.refresh-token-validity-ms=1209600000

# Animal Registry API
animal.registry.api.key=${ANIMAL_REGISTRY_API_KEY:dummy-key}
animal.registry.api.url=http://apis.data.go.kr/1543061/animalInfoSrvc/animalInfo

# Community Storage (MVP Local Upload)
community.storage.public-base-url=${COMMUNITY_STORAGE_PUBLIC_BASE_URL:http://localhost:8080}
# Run backend from aini-inu-backend root so this relative path resolves to ../common-docs/storage.
community.storage.local.base-dir=../common-docs/storage
community.storage.presigned.expires-seconds=${COMMUNITY_STORAGE_PRESIGNED_EXPIRES_SECONDS:300}

# LostPet AI search options (Spring AI only)
lostpet.ai.vector-top-k=${LOSTPET_AI_VECTOR_TOP_K:50}
lostpet.chat.base-url=${LOSTPET_CHAT_BASE_URL:http://localhost:18081}
lostpet.chat.direct-create-path=${LOSTPET_CHAT_DIRECT_CREATE_PATH:/api/v1/chat-rooms/direct}
resilience4j.retry.instances.lostpetChatDirect.max-attempts=2
resilience4j.retry.instances.lostpetChatDirect.wait-duration=250ms
resilience4j.retry.instances.lostpetChatDirect.retry-exceptions=scit.ainiinu.lostpet.integration.chat.ChatDirectConnectException
resilience4j.retry.instances.lostpetChatDirect.ignore-exceptions=scit.ainiinu.lostpet.integration.chat.ChatDirectAuthException,scit.ainiinu.lostpet.integration.chat.ChatDirectResponseSchemaException

# LostPet search session defaults
lostpet.search.session-ttl-hours=${LOSTPET_SEARCH_SESSION_TTL_HOURS:24}
lostpet.search.top-n=${LOSTPET_SEARCH_TOP_N:20}

# Gemini / Spring AI (Google GenAI Embedding + PgVector)
spring.ai.model.chat=none
spring.ai.model.embedding.text=google-genai
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.embedding.text.options.model=${GEMINI_EMBEDDING_MODEL:text-embedding-004}
spring.ai.vectorstore.pgvector.initialize-schema=${SPRING_AI_PGVECTOR_INITIALIZE_SCHEMA:false}
spring.ai.vectorstore.pgvector.table-name=${SPRING_AI_PGVECTOR_TABLE_NAME:lostpet_vector_store}
spring.ai.vectorstore.pgvector.schema-name=${SPRING_AI_PGVECTOR_SCHEMA_NAME:public}
spring.ai.vectorstore.pgvector.dimensions=${SPRING_AI_PGVECTOR_DIMENSIONS:768}
spring.ai.vectorstore.pgvector.distance-type=${SPRING_AI_PGVECTOR_DISTANCE_TYPE:COSINE_DISTANCE}
spring.ai.vectorstore.pgvector.index-type=${SPRING_AI_PGVECTOR_INDEX_TYPE:HNSW}
