animal.registry.api.key=test-key

lostpet.search.session-ttl-hours=24
lostpet.search.top-n=20
spring.ai.model.chat=none
spring.ai.model.embedding.text=none
spring.ai.google.genai.api-key=test-gemini-key
spring.ai.google.genai.embedding.api-key=test-gemini-key
spring.ai.vectorstore.pgvector.initialize-schema=false
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

spring.datasource.url=jdbc:h2:mem:ainidb-test;MODE=PostgreSQL;NON_KEYWORDS=VALUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

spring.sql.init.mode=never
