services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aini-inu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ainiinu
      POSTGRES_USER: ainiinu
      POSTGRES_PASSWORD: ainiinu
    ports:
      - "5432:5432"
    volumes:
      - aini_inu_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ainiinu -d ainiinu" ]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aini-inu-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ainiinu
      SPRING_DATASOURCE_USERNAME: ainiinu
      SPRING_DATASOURCE_PASSWORD: ainiinu
      COMMUNITY_STORAGE_LOCAL_BASE_DIR: /app/var/uploads
      COMMUNITY_STORAGE_PUBLIC_BASE_URL: http://localhost:8080
    ports:
      - "8080:8080"
    volumes:
      - aini_inu_backend_uploads:/app/var/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  aini_inu_postgres_data:
  aini_inu_backend_uploads:
