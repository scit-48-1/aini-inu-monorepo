name: Aini-Inu Monorepo Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 1. 특정 백엔드 모듈만 빌드하여 시간과 자원 절약
      - name: Build Backend Module
        run: |
          chmod +x gradlew
          ./gradlew :aini-inu-backend:build -x test 

      # 2. 빌드된 JAR 파일을 EC2 서버의 앱 폴더로 전송
      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 모듈 폴더 구조(aini-inu-backend/build/libs/)를 반영한 경로
          source: "aini-inu-backend/build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 3 # 파일명만 남기고 앞의 폴더 경로 3개는 제거

      # 3. 배포 스크립트 실행: 환경 변수 갱신 및 서비스 재시작
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/app
            
            # Secrets에 저장된 ENV_FILE 내용을 실제 .env 파일로 생성
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # 전송된 JAR 파일 이름을 서비스가 사용하는 고정 이름으로 변경
            mv *.jar aini-inu.jar || true
            
            # 혁진 님이 등록한 systemd 서비스를 재시작하여 변경사항 반영
            sudo systemctl restart ainiinu