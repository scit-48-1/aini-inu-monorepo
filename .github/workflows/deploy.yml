name: Aini-Inu Monorepo Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build Backend Module
        run: |
          chmod +x gradlew
          ./gradlew :aini-inu-backend:build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "aini-inu-backend/build/libs/*.jar"
          target: "/home/ubuntu/app"
          strip_components: 3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app

            printf '%s' "${{ secrets.ENV_FILE }}" > .env

            NEW_JAR=$(ls -t *.jar 2>/dev/null | grep -vE '(^aini-inu\.jar$|-plain\.jar$)' | head -n 1)
            if [ -n "$NEW_JAR" ]; then
              mv "$NEW_JAR" aini-inu.jar
            fi

            sudo systemctl restart ainiinu
